<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>::TITLE_REPLACE_BOX::</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
		body {
			margin: 0;
			padding: 0;
			background: #fffcf0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.container {
			display: flex;
			width: 80vw;
			max-width: 1000px;
			min-height: 60vh;
			border-radius: 18px;
			background: #fffcf0;
			overflow: hidden;
		}

		.left {
			flex: 1;
			display: flex;
			flex-direction: column;
			justify-content: center;
			padding: 48px 36px;
		}

		.left h1 {
			font-size: 2.2rem;
			color: #b48e6a;
			margin-bottom: 24px;
		}

		.left p {
			font-size: 1.2rem;
			color: #7c6f57;
			margin-bottom: 18px;
		}

		.btn {
			display: inline-block;
			padding: 10px 28px;
			background: #ffdea5;
			color: #b48e6a;
			border-radius: 6px;
			text-decoration: none;
			font-size: 1rem;
			margin-top: 12px;
			transition: background 0.25s, color 0.25s;
		}

		.btn:hover {
			background: #ffbd4c;
			color: #fff6e6;
		}

		.right {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			background: none;
		}

		.right img {
			max-width: 100%;
			max-height: 60vh;
			border-radius: 12px;
		}

		@media (max-width: 700px) {
			.container {
				flex-direction: column;
				width: 98vw;
				min-height: unset;
			}

			.right,
			.left {
				padding: 24px 12px;
			}

			.right img {
				max-height: 30vh;
			}
		}

		.status-text {
			position: relative;
			cursor: help;
			border-bottom: 1px dashed #b48e6a;
		}

		.status-text .zh {
			display: none;
			position: absolute;
			bottom: 100%;
			left: 0;
			background: #b48e6a;
			color: #fff;
			padding: 4px 8px;
			border-radius: 4px;
			font-size: 0.8rem;
			white-space: nowrap;
			z-index: 10;
		}

		.status-text:hover .zh {
			display: block;
		}
	</style>
	<link rel="icon" type="image/png" href="https://static.hzchu.top/favicon_main.ico">
</head>
<body>
  <div class="container">

    </div>
    <div class="right">
      <img src="::WRONG_IMAGE_REPLACE_BOX::" alt="::TITLE_REPLACE_BOX::">
    </div>
  </div>
</body>
</html>
